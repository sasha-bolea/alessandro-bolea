<!doctype html>
<html lang="it">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Alessandro Bolea</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="background-text break-word">
            <strong><span id="background-text"></span></strong>
        </div>
        <h1 class="break-word">
            <span class="line-numbers" id="name-line-numbers">1</span
            ><span id="full-name"
                ><span id="surname"></span><span id="name"></span
            ></span>
        </h1>
        <div class="indent-line">
            <strong><span id="indent-line"></span></strong>
        </div>
        <span id="closing-brace">}</span>
        <section class="reveal-section">
            <div class="reveal-text">
                <span class="line-numbers" id="reveal-line-numbers"></span>
                <span id="reveal-content"></span>
            </div>
        </section>

        <script src="script.js"></script>
    </body>
</html>
